<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <h2 class="text-sm font-semibold text-slate-800">Quick Actions</h2>
  <div class="mt-3 flex flex-wrap gap-2">
    {% if actions %}
      {% for action in actions %}
      <a href="{{ action.url }}" class="rounded-lg bg-[#16a34a] px-4 py-2 text-sm font-medium text-white shadow-sm transition-all duration-200 hover:scale-105 hover:bg-green-700 hover:shadow-md">
        {{ action.label }}
      </a>
      {% endfor %}
    {% else %}
      <p class="text-sm text-slate-500">No quick actions available.</p>
    {% endif %}
  </div>
</div>
