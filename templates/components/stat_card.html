{% if card.url %}
<a href="{{ card.url }}" class="block rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all duration-200 hover:scale-105 hover:shadow-md">
{% else %}
<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all duration-200 hover:scale-105 hover:shadow-md">
{% endif %}
  <div class="flex items-start justify-between gap-2">
    <p class="text-xs font-medium uppercase tracking-wide text-slate-400">{{ card.title }}</p>
    <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-green-50 text-green-700">●</span>
  </div>
  <p class="mt-3 text-3xl font-bold text-slate-900">{{ card.value|floatformat:0 }}</p>
  <p class="mt-1 text-sm text-slate-600">{{ card.subtitle }}</p>
{% if card.url %}
</a>
{% else %}
</div>
{% endif %}
